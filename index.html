<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ГРОМКИЙ САЙТ • Я</title>
    <!-- Подключаем "жирный" шрифт и иконочки для соц. волн -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Bungee+Shade&family=Rubik+Glitch&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* СБРОС И БАЗА */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            /* КИСЛОТНЫЙ ГРАДИЕНТ — ГРОМКО И ЯДОВИТО */
            background: linear-gradient(145deg, #ff0080 0%, #ff8c00 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Black Ops One', cursive;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Агрессивный паттерн поверх градиента */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                repeating-linear-gradient(45deg, rgba(0,0,0,0.2) 0px, rgba(0,0,0,0.2) 4px, transparent 4px, transparent 8px);
            pointer-events: none;
            z-index: 0;
        }

        /* ОСНОВНОЙ КОНТЕЙНЕР — БУДТО УСИЛИТЕЛЬ */
        .boombox {
            max-width: 1100px;
            width: 100%;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(10px);
            border: 6px solid #fff210;
            box-shadow: 0 0 0 8px #f0f, 0 30px 40px rgba(0,0,0,0.7), 0 0 40px #ffcc00;
            border-radius: 60px 60px 30px 30px;
            padding: 40px 30px;
            position: relative;
            z-index: 10;
            transition: 0.2s;
            animation: pulse-border 1.5s infinite alternate;
        }

        @keyframes pulse-border {
            0% { box-shadow: 0 0 0 8px #f0f, 0 0 30px #ff0, 0 30px 40px black; }
            100% { box-shadow: 0 0 0 15px #0ff, 0 0 70px #f0f, 0 30px 40px black; }
        }

        /* ЗВУКОВЫЕ ВОЛНЫ (динамики) */
        .speaker-grill {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
            margin-bottom: 30px;
        }

        .speaker {
            width: 90px;
            height: 90px;
            background: radial-gradient(circle at 30% 30%, #aaa, #333);
            border-radius: 50%;
            border: 6px dashed #ffdd00;
            box-shadow: inset 0 -5px 10px rgba(0,0,0,0.8), 0 0 0 4px magenta;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            color: white;
            text-shadow: 0 0 10px cyan;
            animation: wobble 0.8s infinite ease-in-out alternate;
        }

        .speaker:nth-child(2) { animation-delay: 0.2s; }
        .speaker:nth-child(3) { animation-delay: 0.4s; }

        @keyframes wobble {
            from { transform: scale(1) rotate(0deg); }
            to { transform: scale(1.2) rotate(8deg); }
        }

        /* ГЛАВНЫЙ ЗАГОЛОВОК */
        .name-title {
            font-family: 'Bungee Shade', cursive;
            font-size: clamp(3rem, 15vw, 7rem);
            text-align: center;
            color: #fff720;
            text-transform: uppercase;
            line-height: 1.1;
            text-shadow: 8px 8px 0 #ff006e, 15px 15px 20px black, 0 0 30px cyan;
            letter-spacing: 5px;
            word-break: break-word;
            transform: rotate(-2deg) scale(1.05);
margin: 20px 0;
        }

        /* Подзаголовок — кричалка */
        .tagline {
            font-family: 'Rubik Glitch', cursive;
            font-size: clamp(1.8rem, 6vw, 3.3rem);
            text-align: center;
            background: black;
            color: #f6ffa5;
            padding: 15px 10px;
            border-radius: 100px;
            border: 5px solid red;
            box-shadow: 0 0 0 3px blue, 0 15px 0 #7d007d;
            margin-bottom: 40px;
            transform: rotate(1deg);
            word-break: break-word;
        }

        /* СЕТКА С ГРОМКИМИ КАРТОЧКАМИ */
        .grid-loud {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
            gap: 30px;
            margin: 50px 0;
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            border: 4px solid #39ff14;
            border-radius: 40px 10px 40px 10px;
            padding: 30px 15px;
            backdrop-filter: blur(15px);
            color: white;
            text-align: center;
            transition: 0.15s linear;
            box-shadow: 15px 15px 0 #ff44ee, 0 0 30px cyan;
        }

        .card:hover {
            transform: scale(1.07) rotate(-1deg);
            background: rgba(255, 215, 0, 0.9);
            color: black;
            border-color: black;
            box-shadow: 0 0 50px yellow;
        }

        .card i {
            font-size: 60px;
            margin-bottom: 20px;
            color: #ffb6ff;
            text-shadow: 5px 5px 0 purple;
        }

        .card:hover i {
            color: black;
        }

        .card h3 {
            font-size: 2.2rem;
            font-family: 'Black Ops One', cursive;
        }

        /* БЛОК С РЕЗКИМИ КНОПКАМИ (как печатная плата) */
        .button-panel {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 25px;
            margin: 40px 0 20px;
        }

        .loud-btn {
            background: #111;
            border: none;
            color: #f6ff00;
            font-family: 'Black Ops One', cursive;
            font-size: 2rem;
            padding: 20px 35px;
            border-radius: 120px 20px 120px 20px;
            border-bottom: 10px solid #ff00c8;
            border-left: 6px solid cyan;
            box-shadow: 0 0 0 3px white, 12px 12px 0 black;
            cursor: pointer;
            transition: 0.1s cubic-bezier(1, 0, 0, 1);
            text-transform: uppercase;
            flex: 0 1 auto;
        }

        .loud-btn:active {
            transform: translate(10px, 10px);
            box-shadow: 0 0 0 3px white, 2px 2px 0 black;
            border-bottom-width: 3px;
        }

        .loud-btn:hover {
            background: #f6ff00;
            color: black;
            border-bottom-color: black;
            border-left-color: black;
            box-shadow: 0 0 40px magenta, 12px 12px 0 cyan;
        }

        /* эквалайзер-полоски */
        .eq-bars {
            display: flex;
            justify-content: space-around;
            align-items: flex-end;
            height: 90px;
            margin: 40px 0 10px;
            gap: 8px;
        }

        .bar {
            width: 100%;
            background: linear-gradient(to top, #ff0, #f0f);
            height: calc(20% + 30% * random()); /* будет переопределено inline-style или анимацией */
            border-radius: 20px 20px 0 0;
            border: 2px solid cyan;
            animation: dance 0.4s infinite alternate ease-in-out;
        }

        .bar:nth-child(1) { animation-duration: 0.3s; background: #ff44ee; }
        .bar:nth-child(2) { animation-duration: 0.5s; background: #3aff9e; }
        .bar:nth-child(3) { animation-duration: 0.2s; background: #ffb347; }
        .bar:nth-child(4) { animation-duration: 0.7s; background: #1e90ff; }
        .bar:nth-child(5) { animation-duration: 0.4s; background: #ff3b3b; }

        @keyframes dance {
            0% { height: 10px; }
            100% { height: 90px; }
        }
/* подвал с "частотой" */
        .frequency {
            font-size: 2rem;
            color: black;
            background: chartreuse;
            display: inline-block;
            padding: 15px 40px;
            border-radius: 60px;
            border: 6px dotted purple;
            font-weight: bold;
            margin-top: 30px;
            text-shadow: 3px 3px 0 pink;
            box-shadow: 0 0 40px white;
            transform: rotate(-1deg);
        }

        /* адаптация */
        @media (max-width: 600px) {
            .boombox { padding: 20px 15px; }
            .loud-btn { font-size: 1.4rem; padding: 15px 20px; }
        }
    </style>
</head>
<body>
    <div class="boombox">
        <!-- динамики-глаза -->
        <div class="speaker-grill">
            <div class="speaker"><i class="fas fa-bolt"></i></div>
            <div class="speaker"><i class="fas fa-volume-up"></i></div>
            <div class="speaker"><i class="fas fa-skull"></i></div>
        </div>

        <!-- ИМЯ (поменяй на своё) -->
        <h1 class="name-title">МАКСИМ</h1>
        <!-- или впиши любое имя: АЛЕКСЕЙ / DEMID / СОНИК -->

        <div class="tagline">
            <span>🤘 ГРОМЧЕ ВСЕХ 🤘</span>
        </div>

        <!-- Виджет-эквалайзер (танцующие полоски) -->
        <div class="eq-bars">
            <div class="bar" style="height: 80px;"></div>
            <div class="bar" style="height: 30px;"></div>
            <div class="bar" style="height: 60px;"></div>
            <div class="bar" style="height: 95px;"></div>
            <div class="bar" style="height: 45px;"></div>
            <div class="bar" style="height: 70px;"></div>
        </div>

        <!-- Громкие достижения / факты (сетка) -->
        <div class="grid-loud">
            <div class="card">
                <i class="fas fa-guitar"></i>
                <h3>100 DB</h3>
                <p>Постоянно говорю громко</p>
            </div>
            <div class="card">
                <i class="fas fa-headphones-alt"></i>
                <h3>BASS BOOST</h3>
                <p>Низкие частоты пробивают стены</p>
            </div>
            <div class="card">
                <i class="fas fa-record-vinyl"></i>
                <h3>VINYL</h3>
                <p>Круче любого бита</p>
            </div>
        </div>

        <!-- Панель кнопок (кричащие призывы) -->
        <div class="button-panel">
            <button class="loud-btn" onclick="alert('💥 БУУУМ! ТЫ ЖМЕШЬ ГРОМКО 💥')">ТЫК</button>
            <button class="loud-btn" onclick="window.location.href='https://www.youtube.com/watch?v=dQw4w9WgXcQ'">МУЗЫКА</button>
            <button class="loud-btn" onclick="document.body.style.background = 'linear-gradient(145deg, #00ffff, #ff00ff)';">СМЕНИ ФОН</button>
        </div>

        <!-- Фраза для настроения (энергия) -->
        <div style="text-align: center; margin: 30px 0;">
            <span class="frequency">ЧАСТОТА: 220 ВОЛЬТ</span>
        </div>

        <!-- Ещё немного звуковых элементов (волны) -->
        <svg style="width:100%; height: 60px; margin-top: 10px;" viewBox="0 0 1200 60" preserveAspectRatio="none">
            <path d="M0,30 Q30,0 60,30 T120,30 T180,30 T240,30 T300,30 T360,30 T420,30 T480,30 T540,30 T600,30 T660,30 T720,30 T780,30 T840,30 T900,30 T960,30 T1020,30 T1080,30 T1140,30 T1200,30" stroke="#FFEA00" stroke-width="10" fill="none" stroke-dasharray="8 8" />
        </svg>

        <!-- Небольшая подпись: САБВУФЕР СТУДИО -->
        <div style="display: flex; justify-content: center; gap: 30px; font-size: 2rem; color: white; margin-top: 10px; text-shadow: 5px 5px 0 black;">
            <i class="fas fa-circle" style="color: cyan;"></i>
            <i class="fas fa-circle" style="color: magenta;"></i>
            <i class="fas fa-circle" style="color: yellow;"></i>
        </div>
    </div>

    <!-- маленький скрипт для дополнительной динамики -->
    <script>
        // делаем живой эквалайзер (меняем высоту полосок)
        setInterval(() => {
            document.querySelectorAll('.bar').forEach(bar => {
let newHeight = Math.floor(Math.random() * 90) + 10; // от 10 до 100px
                bar.style.height = newHeight + 'px';
            });
        }, 280);
    </script>
</body>
</html>
